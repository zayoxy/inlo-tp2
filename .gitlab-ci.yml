# Adapted to use UV instead of pip: https://docs.astral.sh/uv/guides/integration/gitlab/
variables:
  UV_VERSION: "0.11.1"
  PYTHON_VERSION: "python3.10"
  BASE_LAYER: alpine
  # GitLab CI creates a separate mountpoint for the build directory,
  # so we need to copy instead of using hard links.
  UV_LINK_MODE: copy

  UV_IMAGE: ghcr.io/astral-sh/uv:$UV_VERSION-$PYTHON_VERSION-$BASE_LAYER

  STAGE_ID: ${CI_PROJECT_NAME}_${CI_BUILD_REF_NAME}_${CI_JOB_NAME}_${CI_JOB_ID}

cache:
  paths:
    - .cache/uv
    - .venv/

stages:
  - test
  - package
  - test-package

# Using kaniko, which is an laternative for Docker, because our Gitlab runners are not configured to build and push images with Docker.
image-creation:
  stage: package
  image:
    name: gcr.io/kaniko-project/executor:v1.9.0-debug
    entrypoint: [""]
  before_script: []
  script:
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/Dockerfile"
      --destination "${CI_REGISTRY_IMAGE}:${CI_COMMIT_TAG}"

pytest:
  stage: test
  image: $UV_IMAGE
  script:
    - uv sync
    - uv run pytest

package-creation:
  stage: package
  image: $UV_IMAGE
  script:
    - uv add twine
    - uv build --wheel
    # attention: le package registry n'autorise pas de pousser 2x la même version (==> changer ou supprimer le package)
    - TWINE_PASSWORD=${CI_JOB_TOKEN} TWINE_USERNAME=gitlab-ci-token uv run twine upload --repository-url ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/pypi dist/*
  artifacts:
    paths:
      - dist/*.whl